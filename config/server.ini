; AppCenter Server bootstrap configuration
;
; Bu dosya sadece uygulamanin ayaga kalkmasi icin gereken altyapi ayarlarini tutar.
; Runtime/product davranisi ayarlari DB icindeki `settings` tablosundan ve `/settings`
; ekranindan yonetilir. Bu ayrim sayesinde deploy sonrasi davranis degistirmek icin
; ortam degiskeni veya servis restart zorunlulugu ortadan kalkar.

[app]
; Uygulama basligi ve asset version cache-busting degeri.
app_name = AppCenter Server
app_version = 1.1.6
api_v1_prefix = /api/v1

[database]
; PostgreSQL baglanti cumlesi. Server process'i baslarken ilk okunan kritik ayardir.
database_url = postgresql+psycopg2://appcenter:Appcenter2026@127.0.0.1:5432/appcenter

[jwt]
; Web login token imzalama anahtari.
secret_key = change-me-in-production-use-a-strong-random-key
jwt_algorithm = HS256
jwt_expire_minutes = 60

[uploads]
; Paketler, ikonlar, avatarlar ve raporlar bu kok altinda tutulur.
upload_dir = /var/lib/appcenter/uploads
max_upload_size = 2147483648
max_icon_size = 5242880

[server]
; HTTP listener ve CORS bootstrap ayarlari.
server_host = 0.0.0.0
server_port = 8000
debug = false
cors_origins = ["*"]

[logging]
; Uygulama log hedefi ve minimum log seviyesi.
log_file = /var/log/appcenter/server.log
log_level = INFO

[remote_support]
; Bunlar runtime degil, bridge altyapisi ile ilgili bootstrap ayarlaridir.
; Session timeout, menu aktifligi, viewer modu gibi davranis ayarlari DB'dedir.
guac_reverse_vnc_host =
guac_reverse_vnc_port = 5500
novnc_token_file = /opt/appcenter/novnc/tokens.txt
novnc_ws_path = /novnc-ws
