{% extends 'base.html' %}
{% block title %}Uzak Destek Oturumu{% endblock %}
{% block content %}
<div class="card">
  <div class="row spread wrap">
    <h3 style="margin:0;">Uzak Destek Oturumu #{{ session_id }}</h3>
    <div class="row wrap" style="gap:8px;">
      <button id="btn-refresh" class="btn secondary" type="button">Yenile</button>
      <button id="btn-end" class="btn" type="button">Oturumu Bitir</button>
    </div>
  </div>

  <div style="margin-top:8px;" id="session-box" class="muted">Yukleniyor...</div>
  <div style="margin-top:8px; display:flex; align-items:center; gap:8px;">
    <span id="conn-badge" class="badge warn">Hazir</span>
    <div id="viewer-status" class="muted">Canli ekran baglantisi hazirlaniyor...</div>
  </div>
  <div id="viewer-toolbar" style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; padding:10px; border:1px solid #2f3640; border-radius:10px; background:linear-gradient(135deg,#151b2f 0%,#1e2947 100%);">
    <button id="tool-connect" class="btn" type="button">Baglan</button>
    <button id="tool-fullscreen" class="btn secondary" type="button">Tam Ekran</button>
    <button id="tool-scale" class="btn secondary" type="button">Olcekleme: Acik</button>
    <button id="tool-viewonly" class="btn secondary" type="button">Kontrol: Acik</button>
    <button id="tool-cad" class="btn secondary" type="button">Ctrl+Alt+Del</button>
    <button id="tool-clipboard" class="btn secondary" type="button">Clipboard Gonder</button>
    <button id="tool-disconnect" class="btn secondary" type="button">Baglantiyi Kes</button>
    <span id="toolbar-monitor-pill" class="badge warn">Monitör: -</span>
    <span id="toolbar-mode-pill" class="badge warn">Mod: -</span>
  </div>
  <div id="viewer-wrap" style="margin-top:8px; min-height:560px; border:1px solid #2f3640; border-radius:10px; background:#0b1020; overflow:hidden;">
    <div id="viewer-display" style="width:100%; height:100%; min-height:560px;"></div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  AppCenterApi.protectPage();

  const SESSION_ID = {{ session_id }};
  const NOVNC_MODE = '{{ novnc_mode or "iframe" }}';
  const NOVNC_ASSET_VERSION = '{{ ASSET_VERSION }}';
  let currentSession = null;
  let currentRfb = null;
  let currentStage = null;
  let autoConnectAttempted = false;
  let lastSessionStatus = '';
  let closeEndSent = false;
  let liveConnState = 'idle'; // idle|ticketing|connecting|connected|reconnecting|disconnected|error

  function esc(s) {
    return (s || '')
      .toString()
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function setViewerStatus(text) {
    const el = document.getElementById('viewer-status');
    if (el) el.textContent = text || '';
  }

  function setConnBadge(label, tone) {
    const el = document.getElementById('conn-badge');
    if (!el) return;
    el.textContent = label || '-';
    if (tone === 'ok') {
      el.className = 'badge ok';
      return;
    }
    if (tone === 'error') {
      el.className = 'badge warn';
      return;
    }
    el.className = 'badge warn';
  }

  function isLiveConnected() {
    return ['connecting', 'connected', 'reconnecting'].includes(liveConnState);
  }

  function setToolBtn(id, enabled, active) {
    const el = document.getElementById(id);
    if (!el) return;
    el.disabled = !enabled;
    el.style.opacity = enabled ? '1' : '0.6';
    el.style.filter = enabled ? 'none' : 'grayscale(0.25)';
    if (active) {
      el.classList.remove('secondary');
    } else {
      el.classList.add('secondary');
    }
  }

  function syncToolbar() {
    const pill = document.getElementById('toolbar-mode-pill');
    const monitorPill = document.getElementById('toolbar-monitor-pill');
    if (monitorPill) {
      const monitorCount = Number((currentSession && currentSession.monitor_count) || 0);
      monitorPill.textContent = `Monitör: ${monitorCount > 0 ? monitorCount : '-'}`;
      monitorPill.className = monitorCount > 0 ? 'badge ok' : 'badge warn';
    }
    if (pill) {
      pill.textContent = `Mod: ${NOVNC_MODE}`;
      pill.className = NOVNC_MODE === 'embedded' ? 'badge ok' : 'badge warn';
    }
    const connected = !!currentRfb && liveConnState === 'connected';
    const embedded = NOVNC_MODE === 'embedded';
    const enabled = connected && embedded;
    const state = ((currentSession && currentSession.status) || '').toLowerCase();
    const canConnect = ['approved', 'connecting', 'active'].includes(state);
    const connectEnabled = canConnect && !isLiveConnected();
    const scaleOn = !!(currentRfb && currentRfb.scaleViewport);
    const viewOnly = !!(currentRfb && currentRfb.viewOnly);

    const scaleBtn = document.getElementById('tool-scale');
    if (scaleBtn) scaleBtn.textContent = `Olcekleme: ${scaleOn ? 'Acik' : 'Kapali'}`;
    const viewBtn = document.getElementById('tool-viewonly');
    if (viewBtn) viewBtn.textContent = `Kontrol: ${viewOnly ? 'Kapali' : 'Acik'}`;

    setToolBtn('tool-connect', connectEnabled, false);
    setToolBtn('tool-fullscreen', embedded, false);
    setToolBtn('tool-scale', enabled, scaleOn);
    setToolBtn('tool-viewonly', enabled, !viewOnly);
    setToolBtn('tool-cad', enabled && !viewOnly, false);
    setToolBtn('tool-clipboard', enabled && !viewOnly, false);
    setToolBtn('tool-disconnect', isLiveConnected(), false);
  }

  function sleepMs(ms) {
    return new Promise((resolve) => setTimeout(resolve, ms));
  }

  async function sendCadWithFallback() {
    if (!currentRfb) return;
    try {
      currentRfb.viewOnly = false;
      currentRfb.focus();
    } catch (_) {}

    // Primary path
    try {
      currentRfb.sendCtrlAltDel();
      await sleepMs(60);
    } catch (_) {}

    // Fallback 1: Left-side modifiers
    try {
      currentRfb.sendKey(0xFFE3, 'ControlLeft', true);
      await sleepMs(20);
      currentRfb.sendKey(0xFFE9, 'AltLeft', true);
      await sleepMs(20);
      currentRfb.sendKey(0xFFFF, 'Delete', true);
      await sleepMs(20);
      currentRfb.sendKey(0xFFFF, 'Delete', false);
      await sleepMs(20);
      currentRfb.sendKey(0xFFE9, 'AltLeft', false);
      await sleepMs(20);
      currentRfb.sendKey(0xFFE3, 'ControlLeft', false);
      await sleepMs(40);
    } catch (_) {}

    // Fallback 2: Right-side modifiers (some VNC servers expect these)
    try {
      currentRfb.sendKey(0xFFE4, 'ControlRight', true);
      await sleepMs(20);
      currentRfb.sendKey(0xFFEA, 'AltRight', true);
      await sleepMs(20);
      currentRfb.sendKey(0xFFFF, 'Delete', true);
      await sleepMs(20);
      currentRfb.sendKey(0xFFFF, 'Delete', false);
      await sleepMs(20);
      currentRfb.sendKey(0xFFEA, 'AltRight', false);
      await sleepMs(20);
      currentRfb.sendKey(0xFFE4, 'ControlRight', false);
    } catch (_) {}
  }

  function handleNoVncMessage(ev) {
    const d = ev && ev.data ? ev.data : null;
    if (!d || d.source !== 'appcenter-novnc') return;
    if (d.kind === 'state') {
      const st = (d.payload && d.payload.state ? d.payload.state : '').toLowerCase();
      if (st === 'connecting') {
        liveConnState = 'connecting';
        setConnBadge('Baglaniyor', 'warn');
      } else if (st === 'connected') {
        liveConnState = 'connected';
        setConnBadge('Bagli', 'ok');
      } else if (st === 'reconnecting') {
        liveConnState = 'reconnecting';
        setConnBadge('Yeniden Baglaniyor', 'warn');
      } else if (st === 'disconnecting') {
        liveConnState = 'disconnected';
        setConnBadge('Ayriliyor', 'warn');
      } else if (st === 'disconnected') {
        liveConnState = 'disconnected';
        setConnBadge('Ayrildi', 'warn');
      }
      return;
    }
    if (d.kind === 'status') {
      const text = String((d.payload && d.payload.text) || '');
      const low = text.toLowerCase();
      if (low.includes('authentication rejected') || low.includes('credentials are required') || low.includes('security')) {
        liveConnState = 'error';
        setConnBadge('Kimlik Hatasi', 'error');
      } else if (low.includes('failed to connect to server') || low.includes('something went wrong')) {
        liveConnState = 'error';
        setConnBadge('Sunucuya Erisim Yok', 'error');
      }
      if (text) setViewerStatus(text);
    }
  }

  function disconnectViewer() {
    if (currentRfb) {
      try {
        currentRfb.disconnect();
      } catch (_) {}
      currentRfb = null;
    }
    const host = document.getElementById('viewer-display');
    if (host) host.innerHTML = '';
    currentStage = null;
    syncToolbar();
  }

  function syncViewerGeometry() {
    const host = document.getElementById('viewer-display');
    const wrap = document.getElementById('viewer-wrap');
    if (!host || !wrap) return;
    const inFs = document.fullscreenElement === wrap;
    const h = inFs ? `${Math.max(window.innerHeight - 12, 560)}px` : '560px';
    host.style.height = h;
    host.style.minHeight = '560px';
    if (currentStage) {
      currentStage.style.height = h;
      currentStage.style.minHeight = '520px';
    }
    if (currentRfb) {
      try {
        if (typeof currentRfb._updateScale === 'function') currentRfb._updateScale();
      } catch (_) {}
    }
  }

  async function startViewerEmbedded(ticket, basePath, scheme) {
    const host = document.getElementById('viewer-display');
    host.innerHTML = '';
    host.style.height = '560px';
    host.style.minHeight = '560px';
    const stage = document.createElement('div');
    stage.style.width = '100%';
    stage.style.height = '560px';
    stage.style.minHeight = '520px';
    stage.style.display = 'block';
    stage.style.position = 'relative';
    stage.style.background = '#0b1020';
    stage.style.overflow = 'hidden';
    stage.tabIndex = 0;
    host.appendChild(stage);
    currentStage = stage;

    const mod = await import(`/static/novnc-v1/core/rfb.js?v=${encodeURIComponent(NOVNC_ASSET_VERSION)}`);
    const RFB = mod.default;
    const wsUrl = `${scheme}://${window.location.host}/${basePath}?token=${encodeURIComponent(ticket.token || '')}`;
    const rfb = new RFB(stage, wsUrl, {
      shared: true,
      repeaterID: '',
      wsProtocols: ['binary', 'base64'],
      credentials: { password: ticket.password || '' },
    });
    currentRfb = rfb;
    rfb.scaleViewport = true;
    rfb.resizeSession = false;
    rfb.clipViewport = false;
    rfb.viewOnly = false;
    rfb.showDotCursor = true;
    rfb.qualityLevel = 6;
    rfb.compressionLevel = 2;

    rfb.addEventListener('connect', () => {
      liveConnState = 'connected';
      setConnBadge('Bagli', 'ok');
      setViewerStatus('Canli ekran baglantisi aktif.');
      syncToolbar();
      try {
        rfb.focus();
      } catch (_) {}
      syncViewerGeometry();
    });
    rfb.addEventListener('disconnect', (e) => {
      const clean = !!(e && e.detail && e.detail.clean);
      liveConnState = clean ? 'disconnected' : 'error';
      setConnBadge(clean ? 'Ayrildi' : 'Baglanti Hatasi', clean ? 'warn' : 'error');
      setViewerStatus(clean ? 'Baglanti kapandi.' : 'Baglanti beklenmedik sekilde koptu.');
      currentRfb = null;
      syncToolbar();
    });
    rfb.addEventListener('credentialsrequired', () => {
      try {
        rfb.sendCredentials({ password: ticket.password || '' });
      } catch (_) {}
    });
    rfb.addEventListener('securityfailure', (e) => {
      liveConnState = 'error';
      setConnBadge('Kimlik Hatasi', 'error');
      const reason = e && e.detail && e.detail.status ? String(e.detail.status) : 'security_failure';
      setViewerStatus(`Guvenlik dogrulamasi basarisiz (${reason}).`);
    });

    liveConnState = 'connecting';
    setConnBadge('Baglaniyor', 'warn');
    setViewerStatus(`Canli ekran baglantisi aciliyor (${wsUrl})...`);
    syncViewerGeometry();
    syncToolbar();
  }

  async function startViewerIframe(ticket, basePath, scheme) {
    const host = document.getElementById('viewer-display');
    const iframe = document.createElement('iframe');
    iframe.style.width = '100%';
    iframe.style.height = '100%';
    iframe.style.minHeight = '520px';
    iframe.style.border = '0';
    iframe.allow = 'clipboard-read; clipboard-write';
    iframe.referrerPolicy = 'no-referrer';
    iframe.src = `/static/novnc-v1/vnc.html?v=${encodeURIComponent(NOVNC_ASSET_VERSION)}&autoconnect=1&resize=scale&show_dot=true&host=${encodeURIComponent(window.location.hostname)}&port=${encodeURIComponent(window.location.port || (window.location.protocol === 'https:' ? '443' : '80'))}&encrypt=${window.location.protocol === 'https:' ? '1' : '0'}&path=${encodeURIComponent(basePath)}&password=${encodeURIComponent(ticket.password || '')}&token=${encodeURIComponent(ticket.token)}`;
    host.innerHTML = '';
    host.appendChild(iframe);
    liveConnState = 'connecting';
    setConnBadge('Baglaniyor', 'warn');
    setViewerStatus(`Canli ekran baglantisi aciliyor (${scheme}://${window.location.host}/${basePath})...`);
    syncToolbar();
  }

  async function loadSession() {
    try {
      await AppCenterApi.initUi();
      const data = await AppCenterApi.req(`/remote-support/sessions/${SESSION_ID}`);
      const s = (data && data.session) ? data.session : null;
      if (!s) {
        document.getElementById('session-box').textContent = 'Oturum verisi alinamadi';
        return;
      }
      currentSession = s;

      const html = `
        <div style="overflow-x:auto; border:1px solid #2f3640; border-radius:8px;">
          <table style="min-width:1100px; width:100%; border-collapse:collapse;">
            <thead>
              <tr>
                <th style="text-align:left; padding:8px 10px;">Durum</th>
                <th style="text-align:left; padding:8px 10px;">Ajan</th>
                <th style="text-align:left; padding:8px 10px;">Talep Eden</th>
                <th style="text-align:left; padding:8px 10px;">Sebep</th>
                <th style="text-align:left; padding:8px 10px;">Talep</th>
                <th style="text-align:left; padding:8px 10px;">Onay</th>
                <th style="text-align:left; padding:8px 10px;">Baglandi</th>
                <th style="text-align:left; padding:8px 10px;">Bitis</th>
                <th style="text-align:left; padding:8px 10px;">Bitiren</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td style="padding:8px 10px;"><span class="badge ${s.status === 'active' ? 'ok' : 'warn'}">${esc(s.status || '-')}</span></td>
                <td style="padding:8px 10px; font-family:monospace; font-size:12px;" title="${esc(s.agent_uuid || '-')}">${esc(s.agent_uuid || '-')}</td>
                <td style="padding:8px 10px;">${esc(s.admin_name || '-')}</td>
                <td style="padding:8px 10px;" title="${esc(s.reason || '-')}">${esc(s.reason || '-')}</td>
                <td style="padding:8px 10px; white-space:nowrap;">${esc(AppCenterApi.formatDate(s.requested_at))}</td>
                <td style="padding:8px 10px; white-space:nowrap;">${esc(AppCenterApi.formatDate(s.approved_at))}</td>
                <td style="padding:8px 10px; white-space:nowrap;">${esc(AppCenterApi.formatDate(s.connected_at))}</td>
                <td style="padding:8px 10px; white-space:nowrap;">${esc(AppCenterApi.formatDate(s.ended_at))}</td>
                <td style="padding:8px 10px;">${esc(s.ended_by || '-')}</td>
              </tr>
            </tbody>
          </table>
        </div>
      `;
      document.getElementById('session-box').innerHTML = html;

      const low = (s.status || '').toLowerCase();
      const prevLow = lastSessionStatus;
      lastSessionStatus = low;
      const endedStates = ['ended', 'timeout', 'rejected', 'error'];
      document.getElementById('btn-end').disabled = endedStates.includes(low);

      if (endedStates.includes(low)) {
        autoConnectAttempted = true;
        liveConnState = 'disconnected';
        setConnBadge('Sonlandi', 'warn');
        setViewerStatus('Oturum sonlandi.');
        disconnectViewer();
      } else {
        if (low === 'pending_approval') {
          autoConnectAttempted = false;
          if (!isLiveConnected()) setConnBadge('Onay Bekleniyor', 'warn');
          setViewerStatus('Ajan kullanicisinin onayi bekleniyor. Onay verildiginde baglanti otomatik baslatilacak.');
        } else if (!isLiveConnected()) {
          setConnBadge('Hazir', 'warn');
          setViewerStatus('Oturum acildiginda baglanti otomatik baslatilir. Gerekirse Baglan kullanin.');
        }
        // Auto-start when session becomes connectable (e.g. pending_approval -> approved)
        if (['approved', 'connecting', 'active'].includes(low) && !isLiveConnected() && !autoConnectAttempted) {
          autoConnectAttempted = true;
          setViewerStatus('Onaylandi, baglanti otomatik baslatiliyor...');
          startViewer();
        } else if (prevLow !== low && ['approved', 'connecting', 'active'].includes(low) && !isLiveConnected()) {
          setViewerStatus('Baglanti hazir. Toolbar ustunden Baglan ile acabilirsiniz.');
        }
        syncToolbar();
      }
    } catch (err) {
      document.getElementById('session-box').textContent = err.message || 'Oturum verisi alinamadi';
    }
  }

  async function startViewer() {
    const state = ((currentSession && currentSession.status) || '').toLowerCase();
    if (!['approved', 'connecting', 'active'].includes(state)) {
      liveConnState = 'error';
      setConnBadge('Durum Uygun Degil', 'error');
      setViewerStatus('Baglanmadan once oturum onaylanmis olmalidir.');
      syncToolbar();
      return;
    }
    try {
      autoConnectAttempted = true;
      liveConnState = 'ticketing';
      setConnBadge('Bilet Aliniyor', 'warn');
      setViewerStatus('Canli ekran baglanti bileti aliniyor...');
      const data = await AppCenterApi.req(`/remote-support/sessions/${SESSION_ID}/novnc-ticket`);
      const ticket = data && data.viewer ? data.viewer : null;
      if (!ticket || !ticket.enabled) {
        const reason = ticket && ticket.reason ? ticket.reason : 'viewer_disabled';
        liveConnState = 'error';
        setConnBadge('Bilet Hatasi', 'error');
        setViewerStatus(`Goruntu acilamadi (${reason}).`);
        syncToolbar();
        return;
      }

      disconnectViewer();
      const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
      const basePath = (ticket.ws_path || '/novnc-ws').replace(/^\//, '');
      if (NOVNC_MODE === 'embedded') {
        await startViewerEmbedded(ticket, basePath, scheme);
      } else {
        await startViewerIframe(ticket, basePath, scheme);
      }
    } catch (err) {
      liveConnState = 'error';
      setConnBadge('Baglanti Hatasi', 'error');
      setViewerStatus(err.message || 'Canli ekran baslatilamadi');
      syncToolbar();
    }
  }

  async function endSession() {
    if (!window.confirm('Bu oturum bitirilsin mi?')) return;
    try {
      await AppCenterApi.req(`/remote-support/sessions/${SESSION_ID}/end`, { method: 'POST' });
      AppCenterApi.toast('Oturum bitirme istegi gonderildi');
      closeEndSent = true;
      loadSession();
    } catch (err) {
      AppCenterApi.toast(err.message || 'Oturum bitirilemedi');
    }
  }

  function endSessionOnClose() {
    if (closeEndSent) return;
    const state = ((currentSession && currentSession.status) || '').toLowerCase();
    if (!['approved', 'connecting', 'active'].includes(state)) return;
    closeEndSent = true;
    try {
      const token = localStorage.getItem('appcenter_token') || '';
      fetch(`/api/v1/remote-support/sessions/${SESSION_ID}/end`, {
        method: 'POST',
        keepalive: true,
        headers: token ? { Authorization: `Bearer ${token}` } : {},
      });
    } catch (_) {}
  }

  (async function init() {
    await AppCenterApi.initUi();
    document.getElementById('tool-connect').addEventListener('click', startViewer);
    document.getElementById('btn-refresh').addEventListener('click', loadSession);
    document.getElementById('btn-end').addEventListener('click', endSession);
    document.getElementById('tool-fullscreen').addEventListener('click', async () => {
      const wrap = document.getElementById('viewer-wrap');
      if (!wrap) return;
      try {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        } else {
          await wrap.requestFullscreen();
        }
      } catch (_) {}
    });
    document.getElementById('tool-scale').addEventListener('click', () => {
      if (!currentRfb) return;
      currentRfb.scaleViewport = !currentRfb.scaleViewport;
      syncToolbar();
    });
    document.getElementById('tool-viewonly').addEventListener('click', () => {
      if (!currentRfb) return;
      currentRfb.viewOnly = !currentRfb.viewOnly;
      syncToolbar();
    });
    document.getElementById('tool-cad').addEventListener('click', async () => {
      if (!currentRfb) return;
      setViewerStatus('Ctrl+Alt+Del gonderiliyor...');
      await sendCadWithFallback();
      setViewerStatus('Ctrl+Alt+Del gonderildi.');
    });
    document.getElementById('tool-clipboard').addEventListener('click', async () => {
      if (!currentRfb) return;
      let text = '';
      try {
        text = await navigator.clipboard.readText();
      } catch (_) {
        text = window.prompt('Gonderilecek metni girin:', '') || '';
      }
      if (!text) return;
      try { currentRfb.clipboardPasteFrom(text); } catch (_) {}
    });
    document.getElementById('tool-disconnect').addEventListener('click', () => {
      disconnectViewer();
      liveConnState = 'disconnected';
      setConnBadge('Ayrildi', 'warn');
      setViewerStatus('Baglanti kullanici tarafindan sonlandirildi.');
      syncToolbar();
    });
    await loadSession();
    const initState = ((currentSession && currentSession.status) || '').toLowerCase();
    if (['approved', 'connecting', 'active'].includes(initState) && !isLiveConnected() && !autoConnectAttempted) {
      startViewer();
    }
    setInterval(loadSession, 3000);
    if (NOVNC_MODE !== 'embedded') {
      window.addEventListener('message', handleNoVncMessage);
    }
    if (!isLiveConnected()) {
      setConnBadge('Hazir', 'warn');
      setViewerStatus(`Onayli oturumda baglanti otomatik baslatilir. (mod: ${NOVNC_MODE})`);
    }
    syncToolbar();
    window.addEventListener('beforeunload', () => {
      endSessionOnClose();
      disconnectViewer();
    });
    window.addEventListener('pagehide', () => {
      endSessionOnClose();
    });
    window.addEventListener('resize', () => {
      syncViewerGeometry();
    });
    document.addEventListener('fullscreenchange', () => {
      syncViewerGeometry();
    });
  })();
</script>
{% endblock %}
