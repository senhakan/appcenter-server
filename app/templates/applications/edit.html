{% extends 'base.html' %}
{% block title %}Uygulama Duzenle{% endblock %}
{% block page_title %}Uygulama Duzenle{% endblock %}
{% block page_actions %}
<a class="btn btn-outline-primary btn-sm" href="/applications"><i class="ti ti-list me-1"></i>Liste</a>
{% endblock %}
{% block content %}
<style>
  .field-error { margin-top: 4px; color: var(--tblr-danger, #d63939); font-size: 12px; line-height: 1.3; min-height: 16px; }
</style>
<div class="row justify-content-center">
  <div class="col-12 col-lg-10 col-xl-9">
    <div class="card">
      <div class="card-body">
        <form id="app-edit-form" class="row g-3">
          <div class="col-12 col-md-6"><label class="form-label">Gorunen Ad</label><input class="form-control" name="display_name" required /></div>
          <div class="col-12 col-md-6"><label class="form-label">Versiyon</label><input class="form-control" name="version" required /></div>
          <div class="col-12"><label class="form-label">Aciklama</label><textarea class="form-control" name="description"></textarea></div>
          <div class="col-12 col-md-6"><label class="form-label">Kurulum Parametreleri</label><input class="form-control" name="install_args" placeholder="/S /qn" /></div>
          <div class="col-12 col-md-6"><label class="form-label">Kaldirma Parametreleri</label><input class="form-control" name="uninstall_args" placeholder="/uninstall /quiet" /></div>
          <div class="col-12 col-md-6"><label class="form-label">Kategori</label><input class="form-control" name="category" /></div>
          <div class="col-12 col-md-6 d-flex align-items-end gap-3">
            <label class="form-check"><input class="form-check-input" type="checkbox" name="is_visible_in_store" /><span class="form-check-label">Store'da gorunsun</span></label>
            <label class="form-check"><input class="form-check-input" type="checkbox" name="is_active" /><span class="form-check-label">Aktif</span></label>
          </div>
          <div class="col-12 d-flex justify-content-end"><button class="btn btn-primary" type="submit"><i class="ti ti-device-floppy me-1"></i>Kaydet</button></div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  AppCenterApi.protectPage();
  const appId = Number("{{ app_id }}");

  function clearFormErrors(formEl) { formEl.querySelectorAll('.field-error').forEach((el) => el.remove()); }
  function setFormError(formEl, fieldName, message) {
    const input = formEl.querySelector(`[name="${fieldName}"]`);
    if (!input || !message) return;
    const next = input.nextElementSibling;
    if (next && next.classList && next.classList.contains('field-error')) { next.textContent = message; return; }
    const err = document.createElement('div'); err.className = 'field-error'; err.textContent = message; input.insertAdjacentElement('afterend', err);
  }
  function parseApiErrorToFields(message) {
    const m = (message || '').toString().toLowerCase();
    if (m.includes('display_name is required')) return { display_name: 'Gorunen ad zorunludur' };
    if (m.includes('application name already exists')) return { display_name: 'Bu ad ile baska bir uygulama var' };
    return null;
  }

  async function loadApp() {
    const data = await AppCenterApi.req(`/applications/${appId}`);
    const form = document.getElementById('app-edit-form');
    form.display_name.value = data.display_name || '';
    form.version.value = data.version || '';
    form.description.value = data.description || '';
    form.install_args.value = data.install_args || '';
    form.uninstall_args.value = data.uninstall_args || '';
    form.category.value = data.category || '';
    form.is_visible_in_store.checked = !!data.is_visible_in_store;
    form.is_active.checked = !!data.is_active;
  }

  document.getElementById('app-edit-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearFormErrors(e.target);
    const form = new FormData(e.target);
    const displayName = (form.get('display_name') || '').toString().trim();
    const version = (form.get('version') || '').toString().trim();
    const fieldErrors = {};
    if (!displayName) fieldErrors.display_name = 'Gorunen ad zorunludur';
    if (!version) fieldErrors.version = 'Versiyon zorunludur';
    if (Object.keys(fieldErrors).length) {
      Object.entries(fieldErrors).forEach(([k, v]) => setFormError(e.target, k, v));
      AppCenterApi.toast('Formda eksik veya hatali alanlar var');
      return;
    }
    const payload = {
      display_name: displayName,
      version,
      description: (form.get('description') || '').toString() || null,
      install_args: (form.get('install_args') || '').toString() || null,
      uninstall_args: (form.get('uninstall_args') || '').toString() || null,
      category: (form.get('category') || '').toString() || null,
      is_visible_in_store: form.get('is_visible_in_store') === 'on',
      is_active: form.get('is_active') === 'on',
    };
    try {
      await AppCenterApi.req(`/applications/${appId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      AppCenterApi.toast('Uygulama guncellendi');
      setTimeout(() => { location.href = '/applications'; }, 700);
    } catch (err) {
      const mapped = parseApiErrorToFields(err.message);
      if (mapped) Object.entries(mapped).forEach(([k, v]) => setFormError(e.target, k, v));
      AppCenterApi.toast(err.message);
    }
  });

  loadApp().catch((err) => AppCenterApi.toast(err.message));
</script>
{% endblock %}
