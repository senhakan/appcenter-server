{% extends 'base.html' %}
{% block title %}Uygulama Yukle{% endblock %}
{% block page_title %}Yeni Uygulama Yukle{% endblock %}
{% block page_actions %}
<a class="btn btn-outline-primary btn-sm" href="/applications"><i class="ti ti-list me-1"></i>Liste</a>
{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-9 col-xl-8">
    <div class="card">
      <div class="card-body">
        <form id="upload-form" class="row g-3">
          <div class="col-12 col-md-6"><label class="form-label">Gorunen Ad</label><input class="form-control" name="display_name" required /></div>
          <div class="col-12 col-md-6"><label class="form-label">Versiyon</label><input class="form-control" name="version" required /></div>
          <div class="col-12"><label class="form-label">Aciklama</label><textarea class="form-control" name="description"></textarea></div>
          <div class="col-12 col-md-6"><label class="form-label">Kurulum Parametreleri (install_args)</label><input class="form-control" name="install_args" placeholder="/S /qn" /></div>
          <div class="col-12 col-md-6"><label class="form-label">Kaldirma Parametreleri (uninstall_args)</label><input class="form-control" name="uninstall_args" placeholder="/uninstall /quiet" /></div>
          <div class="col-12 col-md-6"><label class="form-label">Uygulama Ikonu (opsiyonel)</label><input class="form-control" name="icon" type="file" accept=".png,.jpg,.jpeg,.webp,.svg" /></div>
          <div class="col-12 col-md-6"><label class="form-label">Kurulum Dosyasi (.msi / .exe)</label><input class="form-control" name="file" type="file" accept=".msi,.exe" required /></div>
          <div class="col-12 d-flex justify-content-end"><button class="btn btn-primary" type="submit"><i class="ti ti-upload me-1"></i>Yukle</button></div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  AppCenterApi.protectPage();
  document.getElementById('upload-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      const form = new FormData(e.target);
      await AppCenterApi.req('/applications', { method: 'POST', body: form });
      AppCenterApi.toast('Yukleme tamamlandi');
      setTimeout(() => { location.href = '/applications'; }, 700);
    } catch (err) { AppCenterApi.toast(err.message); }
  });
</script>
{% endblock %}
