{% extends 'base.html' %}
{% block title %}Dagitim Duzenle{% endblock %}
{% block page_title %}Dagitim Duzenle{% endblock %}
{% block page_actions %}
<a class="btn btn-outline-primary btn-sm" href="/deployments"><i class="ti ti-list me-1"></i>Liste</a>
{% endblock %}
{% block content %}
<style>
  .field-error { margin-top: 4px; color: var(--tblr-danger, #d63939); font-size: 12px; line-height: 1.3; min-height: 16px; }
</style>
<div class="row justify-content-center">
  <div class="col-12 col-lg-10 col-xl-8">
    <div class="card">
      <div class="card-body">
        <form id="dep-edit-form" class="row g-3">
          <div class="col-12 col-md-8"><label class="form-label">Uygulama</label><select class="form-select" name="app_id" id="app_id" required></select></div>
          <div class="col-12 col-md-4"><label class="form-label">Oncelik</label><input class="form-control" name="priority" type="number" min="1" value="5" required /></div>
          <div class="col-12 col-md-4"><label class="form-label">Hedef Tipi</label><select class="form-select" name="target_type" id="target_type"><option value="All">All</option><option value="Group">Group</option><option value="Agent">Agent</option></select></div>
          <div class="col-12 col-md-4" id="target-group-wrap" style="display:none;"><label class="form-label">Grup</label><select class="form-select" name="target_group_id" id="target_group_id"></select></div>
          <div class="col-12 col-md-8" id="target-agent-wrap" style="display:none;"><label class="form-label">Agent</label><select class="form-select" name="target_agent_uuid" id="target_agent_uuid"></select></div>
          <div class="col-12 d-flex gap-3">
            <label class="form-check"><input class="form-check-input" type="checkbox" name="is_mandatory" /><span class="form-check-label">Zorunlu</span></label>
            <label class="form-check"><input class="form-check-input" type="checkbox" name="force_update" /><span class="form-check-label">Force Update</span></label>
            <label class="form-check"><input class="form-check-input" type="checkbox" name="is_active" /><span class="form-check-label">Aktif</span></label>
          </div>
          <div class="col-12 d-flex justify-content-end"><button class="btn btn-primary" type="submit"><i class="ti ti-device-floppy me-1"></i>Kaydet</button></div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  AppCenterApi.protectPage();
  const deploymentId = Number("{{ deployment_id }}");
  let loadedDeployment = null;

  function clearFormErrors(formEl) { formEl.querySelectorAll('.field-error').forEach((el) => el.remove()); }
  function setFormError(formEl, fieldName, message) {
    const input = formEl.querySelector(`[name="${fieldName}"]`);
    if (!input || !message) return;
    const next = input.nextElementSibling;
    if (next && next.classList && next.classList.contains('field-error')) { next.textContent = message; return; }
    const err = document.createElement('div'); err.className = 'field-error'; err.textContent = message; input.insertAdjacentElement('afterend', err);
  }
  function parseApiErrorToFields(message) {
    const m = (message || '').toString().toLowerCase();
    if (m.includes('application not found')) return { app_id: 'Secili uygulama bulunamadi' };
    if (m.includes('target_id required for group')) return { target_group_id: 'Group hedefi icin grup secilmelidir' };
    if (m.includes('target_id required for agent')) return { target_agent_uuid: 'Agent hedefi icin agent secilmelidir' };
    if (m.includes('target_id must be group id')) return { target_group_id: 'Gecersiz grup secimi' };
    if (m.includes('invalid target_type')) return { target_type: 'Gecersiz hedef tipi' };
    return null;
  }

  function syncTargetInputs() {
    const targetType = document.getElementById('target_type').value;
    document.getElementById('target-group-wrap').style.display = targetType === 'Group' ? '' : 'none';
    document.getElementById('target-agent-wrap').style.display = targetType === 'Agent' ? '' : 'none';
  }

  async function loadFormData() {
    const [dep, appsData, agentsData, groupsData] = await Promise.all([
      AppCenterApi.req(`/deployments/${deploymentId}`),
      AppCenterApi.req('/applications?only_active=true'),
      AppCenterApi.req('/agents'),
      AppCenterApi.req('/groups'),
    ]);
    loadedDeployment = dep;
    const appSelect = document.getElementById('app_id'); appSelect.innerHTML = '';
    (appsData.items || []).forEach((app) => { const option = document.createElement('option'); option.value = String(app.id); option.textContent = `${app.display_name} (${app.version})`; appSelect.appendChild(option); });
    const agentSelect = document.getElementById('target_agent_uuid'); agentSelect.innerHTML = '';
    (agentsData.items || []).forEach((agent) => { const option = document.createElement('option'); option.value = agent.uuid; option.textContent = `${agent.hostname || agent.uuid} (${agent.uuid})`; agentSelect.appendChild(option); });
    const groupSelect = document.getElementById('target_group_id'); groupSelect.innerHTML = '';
    (groupsData.items || []).forEach((group) => { const option = document.createElement('option'); option.value = String(group.id); option.textContent = `${group.name} (#${group.id})`; groupSelect.appendChild(option); });

    const form = document.getElementById('dep-edit-form');
    form.app_id.value = String(dep.app_id);
    form.priority.value = String(dep.priority || 5);
    form.target_type.value = dep.target_type || 'All';
    if (dep.target_type === 'Group' && dep.target_id) form.target_group_id.value = dep.target_id;
    if (dep.target_type === 'Agent' && dep.target_id) form.target_agent_uuid.value = dep.target_id;
    form.is_mandatory.checked = !!dep.is_mandatory;
    form.force_update.checked = !!dep.force_update;
    form.is_active.checked = !!dep.is_active;
    syncTargetInputs();
  }

  document.getElementById('target_type').addEventListener('change', syncTargetInputs);
  document.getElementById('dep-edit-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearFormErrors(e.target);
    if (!loadedDeployment) return;
    const form = new FormData(e.target);
    const targetType = (form.get('target_type') || '').toString().trim();
    const priorityRaw = (form.get('priority') || '').toString().trim();
    const fieldErrors = {};
    if (!targetType) fieldErrors.target_type = 'Hedef tipi zorunludur';
    if (!priorityRaw) fieldErrors.priority = 'Oncelik zorunludur';
    const priority = Number(priorityRaw);
    if (!Number.isFinite(priority) || priority < 1) fieldErrors.priority = 'Oncelik en az 1 olmalidir';
    let targetId = null;
    if (targetType === 'Group') { targetId = (form.get('target_group_id') || '').toString().trim() || null; if (!targetId) fieldErrors.target_group_id = 'Group hedefi icin grup secilmelidir'; }
    if (targetType === 'Agent') { targetId = (form.get('target_agent_uuid') || '').toString().trim() || null; if (!targetId) fieldErrors.target_agent_uuid = 'Agent hedefi icin agent secilmelidir'; }
    if (Object.keys(fieldErrors).length) {
      Object.entries(fieldErrors).forEach(([k, v]) => setFormError(e.target, k, v));
      AppCenterApi.toast('Formda eksik veya hatali alanlar var');
      return;
    }
    try {
      await AppCenterApi.req(`/deployments/${deploymentId}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          app_id: Number(form.get('app_id')), target_type: targetType, target_id: targetType === 'All' ? null : targetId,
          priority, is_mandatory: form.get('is_mandatory') === 'on', force_update: form.get('force_update') === 'on', is_active: form.get('is_active') === 'on',
        }),
      });
      AppCenterApi.toast('Dagitim guncellendi');
      setTimeout(() => { location.href = '/deployments'; }, 700);
    } catch (err) {
      const mapped = parseApiErrorToFields(err.message);
      if (mapped) Object.entries(mapped).forEach(([k, v]) => setFormError(e.target, k, v));
      AppCenterApi.toast(err.message);
    }
  });

  loadFormData().catch((err) => AppCenterApi.toast(err.message));
</script>
{% endblock %}
