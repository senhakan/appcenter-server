{% extends 'base.html' %}
{% block title %}Dagitim Olustur{% endblock %}
{% block page_title %}Yeni Dagitim{% endblock %}
{% block page_actions %}
<a class="btn btn-outline-primary btn-sm" href="/deployments"><i class="ti ti-list me-1"></i>Liste</a>
{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-10 col-xl-8">
    <div class="card">
      <div class="card-body">
        <form id="dep-form" class="row g-3">
          <div class="col-12 col-md-8"><label class="form-label">Uygulama</label><select class="form-select" name="app_id" id="app_id" required></select></div>
          <div class="col-12 col-md-4"><label class="form-label">Oncelik</label><input class="form-control" name="priority" type="number" value="5" required /></div>
          <div class="col-12 col-md-4"><label class="form-label">Hedef Tipi</label><select class="form-select" name="target_type" id="target_type"><option value="All">All</option><option value="Group">Group</option><option value="Agent">Agent</option></select></div>
          <div class="col-12 col-md-4" id="target-group-wrap" style="display:none;"><label class="form-label">Grup</label><select class="form-select" name="target_group_id" id="target_group_id"></select></div>
          <div class="col-12 col-md-8" id="target-agent-wrap" style="display:none;"><label class="form-label">Agent</label><select class="form-select" name="target_agent_uuid" id="target_agent_uuid"></select></div>
          <div class="col-12 d-flex gap-3">
            <label class="form-check"><input class="form-check-input" type="checkbox" name="is_mandatory" /><span class="form-check-label">Zorunlu</span></label>
            <label class="form-check"><input class="form-check-input" type="checkbox" name="force_update" /><span class="form-check-label">Force Update</span></label>
            <label class="form-check"><input class="form-check-input" type="checkbox" name="is_active" checked /><span class="form-check-label">Aktif</span></label>
          </div>
          <div class="col-12 d-flex justify-content-end"><button class="btn btn-primary" type="submit"><i class="ti ti-plus me-1"></i>Olustur</button></div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  AppCenterApi.protectPage();

  function syncTargetInputs() {
    const targetType = document.getElementById('target_type').value;
    document.getElementById('target-group-wrap').style.display = targetType === 'Group' ? '' : 'none';
    document.getElementById('target-agent-wrap').style.display = targetType === 'Agent' ? '' : 'none';
  }

  async function loadFormData() {
    const [appsData, agentsData, groupsData] = await Promise.all([
      AppCenterApi.req('/applications?only_active=true'),
      AppCenterApi.req('/agents'),
      AppCenterApi.req('/groups'),
    ]);
    const appSelect = document.getElementById('app_id'); appSelect.innerHTML = '';
    (appsData.items || []).forEach((app) => { const option = document.createElement('option'); option.value = String(app.id); option.textContent = `${app.display_name} (${app.version})`; appSelect.appendChild(option); });
    const agentSelect = document.getElementById('target_agent_uuid'); agentSelect.innerHTML = '';
    (agentsData.items || []).forEach((agent) => { const option = document.createElement('option'); option.value = agent.uuid; option.textContent = `${agent.hostname} (${agent.uuid})`; agentSelect.appendChild(option); });
    if (!appSelect.value) throw new Error('Aktif uygulama bulunamadi. Once uygulama ekleyin.');
    const groupSelect = document.getElementById('target_group_id'); groupSelect.innerHTML = '';
    (groupsData.items || []).forEach((group) => { const option = document.createElement('option'); option.value = String(group.id); option.textContent = `${group.name} (#${group.id})`; groupSelect.appendChild(option); });
  }

  document.getElementById('target_type').addEventListener('change', syncTargetInputs);
  document.getElementById('dep-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const targetType = form.get('target_type');
    let targetId = null;
    if (targetType === 'Group') targetId = (form.get('target_group_id') || '').toString().trim() || null;
    else if (targetType === 'Agent') targetId = (form.get('target_agent_uuid') || '').toString().trim() || null;
    const payload = {
      app_id: Number(form.get('app_id')), target_type: targetType, target_id: targetId,
      is_mandatory: form.get('is_mandatory') === 'on', force_update: form.get('force_update') === 'on',
      priority: Number(form.get('priority')), is_active: form.get('is_active') === 'on',
    };
    try {
      await AppCenterApi.req('/deployments', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      AppCenterApi.toast('Dagitim olusturuldu');
      setTimeout(() => { location.href = '/deployments'; }, 700);
    } catch (err) { AppCenterApi.toast(err.message); }
  });

  (async () => { try { await loadFormData(); syncTargetInputs(); } catch (err) { AppCenterApi.toast(err.message); } })();
</script>
{% endblock %}
