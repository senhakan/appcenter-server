{% extends 'base.html' %}
{% block title %}Gruplar{% endblock %}
{% block content %}
<style>
  .groups-card-head {
    min-height: 38px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .groups-card-head h3 {
    margin: 0;
  }
  .groups-actions {
    display: flex;
    justify-content: flex-end;
  }
  .groups-hint {
    font-size: 0.85rem;
    color: var(--muted);
  }
  .transfer {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: center;
  }
  .transfer-actions {
    display: grid;
    gap: 8px;
  }
  .transfer select {
    min-height: 260px;
  }
  .group-list-actions {
    display: flex;
    gap: 8px;
  }
  .group-list-toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin: 10px 0 12px;
  }
  .group-list-search {
    max-width: 340px;
  }
  .group-modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(21, 34, 56, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 998;
    padding: 16px;
  }
  .group-modal-backdrop.hidden {
    display: none;
  }
  .group-modal {
    width: 100%;
    max-width: 520px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 18px;
  }
  .group-modal-title {
    margin: 0 0 12px;
  }
</style>

<div class="card">
  <div class="groups-card-head">
    <h3>Grup Listesi</h3>
    <div class="group-list-actions">
      <button class="btn secondary" id="groups-refresh-btn" type="button">Yenile</button>
      <button class="btn" id="groups-new-btn" type="button">Yeni Grup</button>
    </div>
  </div>
  <div class="group-list-toolbar">
    <input id="group-search-input" class="group-list-search" type="text" placeholder="Grup ara: ad veya aciklama" />
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th><th>Grup Adi</th><th>Aciklama</th><th>Ajan Sayisi</th><th></th>
        </tr>
      </thead>
      <tbody id="group-rows"></tbody>
    </table>
  </div>
  <div id="groups-empty-state" class="card hidden" style="margin-top: 12px;">
    <div class="muted">Henuz grup yok, Yeni Grup ile baslayin.</div>
  </div>
</div>

<div class="card" style="margin-top: 16px;">
  <div class="groups-card-head">
    <h3>Gruba Ajan Ata</h3>
  </div>
  <form id="group-assign-form" class="grid">
    <div>
      <label>Grup</label>
      <select id="assign-group-id" required></select>
    </div>
    <div class="transfer">
      <div>
        <label>Atanmamis Ajanlar</label>
        <select id="available-agent-uuids" multiple></select>
      </div>
      <div class="transfer-actions">
        <button class="btn secondary" type="button" id="move-right-all">>></button>
        <button class="btn secondary" type="button" id="move-right">></button>
        <button class="btn secondary" type="button" id="move-left"><</button>
        <button class="btn secondary" type="button" id="move-left-all"><<</button>
      </div>
      <div>
        <label>Gruptaki Ajanlar</label>
        <select id="assigned-agent-uuids" multiple></select>
      </div>
    </div>
    <div class="groups-hint" id="assign-summary"></div>
    <div class="groups-actions">
      <button class="btn" type="submit">Atamalari Kaydet</button>
    </div>
  </form>
  </div>

<div id="group-create-modal" class="group-modal-backdrop hidden" aria-live="polite">
  <div class="group-modal">
    <div class="groups-card-head">
      <h3 class="group-modal-title">Yeni Grup</h3>
      <button class="btn secondary" id="group-modal-close-btn" type="button">Kapat</button>
    </div>
    <form id="group-create-form" class="grid">
      <div>
        <label>Grup Adi</label>
        <input name="name" required />
      </div>
      <div>
        <label>Aciklama</label>
        <input name="description" />
      </div>
      <div class="groups-actions">
        <button class="btn secondary" id="group-modal-cancel-btn" type="button">Iptal</button>
        <button class="btn" type="submit">Olustur</button>
      </div>
    </form>
  </div>
</div>

<div id="group-edit-modal" class="group-modal-backdrop hidden" aria-live="polite">
  <div class="group-modal">
    <div class="groups-card-head">
      <h3 class="group-modal-title">Grup Duzenle</h3>
      <button class="btn secondary" id="group-edit-modal-close-btn" type="button">Kapat</button>
    </div>
    <form id="group-edit-form" class="grid">
      <input type="hidden" name="group_id" />
      <div>
        <label>Grup Adi</label>
        <input name="name" required />
      </div>
      <div>
        <label>Aciklama</label>
        <input name="description" />
      </div>
      <div class="groups-actions">
        <button class="btn secondary" id="group-edit-modal-cancel-btn" type="button">Iptal</button>
        <button class="btn" type="submit">Kaydet</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  AppCenterApi.protectPage();

  let groups = [];
  let agents = [];
  const groupCreateModal = document.getElementById('group-create-modal');
  const groupEditModal = document.getElementById('group-edit-modal');
  let groupSearchQuery = '';

  function toOption(agent, selected = false) {
    const o = document.createElement('option');
    o.value = agent.uuid;
    const suffix = (agent.ip_address || '-').toString();
    o.textContent = `${agent.hostname || agent.uuid} (${suffix})`;
    o.selected = selected;
    return o;
  }

  function selectValues(selectEl) {
    return Array.from(selectEl.options || []).map((o) => o.value);
  }

  function moveSelected(fromEl, toEl) {
    const selected = Array.from(fromEl.selectedOptions || []);
    selected.forEach((opt) => {
      toEl.appendChild(opt);
      opt.selected = false;
    });
  }

  function moveAll(fromEl, toEl) {
    const all = Array.from(fromEl.options || []);
    all.forEach((opt) => {
      toEl.appendChild(opt);
      opt.selected = false;
    });
  }

  function renderGroupsTable() {
    const rows = document.getElementById('group-rows');
    const tableWrap = document.querySelector('.table-wrap');
    const emptyState = document.getElementById('groups-empty-state');
    rows.innerHTML = '';
    if (!Array.isArray(groups) || groups.length === 0) {
      if (tableWrap) tableWrap.classList.add('hidden');
      if (emptyState) emptyState.classList.remove('hidden');
      return;
    }
    if (tableWrap) tableWrap.classList.remove('hidden');
    if (emptyState) emptyState.classList.add('hidden');

    const q = groupSearchQuery.trim().toLowerCase();
    groups
      .filter((g) => {
        if (!q) return true;
        const name = (g.name || '').toLowerCase();
        const desc = (g.description || '').toLowerCase();
        return name.includes(q) || desc.includes(q);
      })
      .forEach((g) => {
      const count = agents.filter((a) => {
        if (Array.isArray(a.group_ids)) return a.group_ids.includes(g.id);
        return Number(a.group_id || 0) === g.id;
      }).length;
      const tr = document.createElement('tr');
      const isSystem = Boolean(g.is_system);
      const editDisabled = isSystem ? 'disabled title="Sistem grubu duzenlenemez"' : '';
      const deleteDisabled = isSystem ? 'disabled title="Sistem grubu silinemez"' : '';
      tr.innerHTML = `
        <td>${g.id}</td>
        <td>${g.name}</td>
        <td>${g.description || '-'}</td>
        <td>${count}</td>
        <td class="row">
          <button class="btn secondary" type="button" data-action="edit-group" data-group-id="${g.id}" ${editDisabled}>Duzenle</button>
          <button class="btn danger" type="button" data-action="delete-group" data-group-id="${g.id}" data-group-name="${(g.name || '').replace(/"/g, '&quot;')}" ${deleteDisabled}>Sil</button>
        </td>
      `;
      rows.appendChild(tr);
    });

    rows.querySelectorAll('button[data-action="edit-group"]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const groupId = Number(btn.getAttribute('data-group-id') || '0');
        const group = groups.find((x) => Number(x.id) === groupId);
        if (!group) return;
        openGroupEditModal(group);
      });
    });

    rows.querySelectorAll('button[data-action="delete-group"]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const groupId = Number(btn.getAttribute('data-group-id') || '0');
        const groupName = btn.getAttribute('data-group-name') || `#${groupId}`;
        if (!groupId) return;
        const affectedAgentCount = agents.filter((a) => {
          if (Array.isArray(a.group_ids)) return a.group_ids.includes(groupId);
          return Number(a.group_id || 0) === groupId;
        }).length;
        const ok = window.confirm(
          `'${groupName}' grubunu silmek istiyor musunuz?\n\n` +
          `Etkilenecek ajan sayisi: ${affectedAgentCount}\n` +
          `Bu gruptaki ajanlar gruptan cikarilacak.\n\n` +
          `Bu islem geri alinamaz.`
        );
        if (!ok) return;
        try {
          await AppCenterApi.req(`/groups/${groupId}`, { method: 'DELETE' });
          await loadData();
          AppCenterApi.toast('Grup silindi');
        } catch (err) {
          AppCenterApi.toast(err.message);
        }
      });
    });
  }

  function renderSelectors() {
    const groupSelect = document.getElementById('assign-group-id');
    const previousSelected = Number(groupSelect.value || 0);
    groupSelect.innerHTML = '';
    groups.forEach((g) => {
      const op = document.createElement('option');
      op.value = String(g.id);
      op.textContent = `${g.name} (#${g.id})`;
      groupSelect.appendChild(op);
    });
    if (previousSelected && groups.some((g) => Number(g.id) === previousSelected)) {
      groupSelect.value = String(previousSelected);
    }

    syncSelectedAgentsForCurrentGroup();
  }

  function syncSelectedAgentsForCurrentGroup() {
    const groupId = Number(document.getElementById('assign-group-id').value || 0);
    const availableEl = document.getElementById('available-agent-uuids');
    const assignedEl = document.getElementById('assigned-agent-uuids');
    const inGroup = agents.filter((a) => Array.isArray(a.group_ids) && a.group_ids.includes(groupId));
    const outGroup = agents.filter((a) => !Array.isArray(a.group_ids) || !a.group_ids.includes(groupId));
    availableEl.innerHTML = '';
    assignedEl.innerHTML = '';
    outGroup.forEach((a) => availableEl.appendChild(toOption(a)));
    inGroup.forEach((a) => assignedEl.appendChild(toOption(a)));
    document.getElementById('assign-summary').textContent =
      `Secili grup icin mevcut atama: ${inGroup.length} ajan | Atanmamis: ${outGroup.length}`;
  }

  async function loadData() {
    const [g, a] = await Promise.all([
      AppCenterApi.req('/groups'),
      AppCenterApi.req('/agents'),
    ]);
    groups = g.items || [];
    agents = a.items || [];
    renderSelectors();
    renderGroupsTable();
  }

  function closeGroupCreateModal() {
    groupCreateModal.classList.add('hidden');
  }

  function openGroupCreateModal() {
    groupCreateModal.classList.remove('hidden');
    const nameInput = document.querySelector('#group-create-form input[name="name"]');
    if (nameInput) nameInput.focus();
  }

  function closeGroupEditModal() {
    groupEditModal.classList.add('hidden');
  }

  function openGroupEditModal(group) {
    const form = document.getElementById('group-edit-form');
    form.group_id.value = String(group.id || '');
    form.name.value = (group.name || '').toString();
    form.description.value = (group.description || '').toString();
    groupEditModal.classList.remove('hidden');
    form.name.focus();
  }

  document.getElementById('groups-new-btn').addEventListener('click', openGroupCreateModal);
  document.getElementById('group-modal-close-btn').addEventListener('click', closeGroupCreateModal);
  document.getElementById('group-modal-cancel-btn').addEventListener('click', closeGroupCreateModal);
  document.getElementById('group-edit-modal-close-btn').addEventListener('click', closeGroupEditModal);
  document.getElementById('group-edit-modal-cancel-btn').addEventListener('click', closeGroupEditModal);
  document.getElementById('groups-refresh-btn').addEventListener('click', () => {
    loadData().catch((err) => AppCenterApi.toast(err.message));
  });
  document.getElementById('group-search-input').addEventListener('input', (evt) => {
    groupSearchQuery = (evt.target.value || '').toString();
    renderGroupsTable();
  });
  groupCreateModal.addEventListener('click', (evt) => {
    if (evt.target === groupCreateModal) closeGroupCreateModal();
  });
  groupEditModal.addEventListener('click', (evt) => {
    if (evt.target === groupEditModal) closeGroupEditModal();
  });

  document.getElementById('group-create-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const f = new FormData(e.target);
    const payload = {
      name: (f.get('name') || '').toString(),
      description: (f.get('description') || '').toString(),
    };
    try {
      await AppCenterApi.req('/groups', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      e.target.reset();
      closeGroupCreateModal();
      await loadData();
      AppCenterApi.toast('Grup olusturuldu');
    } catch (err) {
      AppCenterApi.toast(err.message);
    }
  });

  document.getElementById('group-edit-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const f = new FormData(e.target);
    const groupId = Number((f.get('group_id') || '0').toString());
    if (!groupId) {
      AppCenterApi.toast('Gecerli grup secilemedi');
      return;
    }
    const payload = {
      name: (f.get('name') || '').toString(),
      description: (f.get('description') || '').toString(),
    };
    try {
      await AppCenterApi.req(`/groups/${groupId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      closeGroupEditModal();
      await loadData();
      AppCenterApi.toast('Grup guncellendi');
    } catch (err) {
      AppCenterApi.toast(err.message);
    }
  });

  document.getElementById('assign-group-id').addEventListener('change', syncSelectedAgentsForCurrentGroup);
  document.getElementById('move-right').addEventListener('click', () => {
    moveSelected(document.getElementById('available-agent-uuids'), document.getElementById('assigned-agent-uuids'));
  });
  document.getElementById('move-left').addEventListener('click', () => {
    moveSelected(document.getElementById('assigned-agent-uuids'), document.getElementById('available-agent-uuids'));
  });
  document.getElementById('move-right-all').addEventListener('click', () => {
    moveAll(document.getElementById('available-agent-uuids'), document.getElementById('assigned-agent-uuids'));
  });
  document.getElementById('move-left-all').addEventListener('click', () => {
    moveAll(document.getElementById('assigned-agent-uuids'), document.getElementById('available-agent-uuids'));
  });

  document.getElementById('group-assign-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const groupId = Number(document.getElementById('assign-group-id').value || 0);
    if (!groupId) {
      AppCenterApi.toast('Grup seciniz');
      return;
    }
    const uuids = selectValues(document.getElementById('assigned-agent-uuids'));
    try {
      await AppCenterApi.req(`/groups/${groupId}/agents`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ agent_uuids: uuids }),
      });
      await loadData();
      AppCenterApi.toast('Atamalar guncellendi');
    } catch (err) {
      AppCenterApi.toast(err.message);
    }
  });

  loadData().catch((err) => AppCenterApi.toast(err.message));
</script>
{% endblock %}
