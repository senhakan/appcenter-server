{% extends 'base.html' %}
{% block title %}Grup Duzenle{% endblock %}
{% block page_title %}Grup Duzenle{% endblock %}
{% block page_actions %}
<a class="btn btn-outline-primary btn-sm" href="/groups"><i class="ti ti-list me-1"></i>Liste</a>
{% endblock %}
{% block content %}
<style>
  .transfer { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; }
  .transfer-actions { display: grid; gap: 8px; }
  .transfer select { min-height: 280px; }
  .field-error { margin-top: 4px; color: var(--tblr-danger, #d63939); font-size: 12px; line-height: 1.3; min-height: 16px; }
</style>
<div class="row justify-content-center">
  <div class="col-12 col-xl-10">
    <div class="card">
      <div class="card-body">
        <form id="group-meta-form" class="row g-3">
          <div class="col-12 col-md-6"><label class="form-label">Grup Adi</label><input class="form-control" name="name" required /></div>
          <div class="col-12 col-md-6"><label class="form-label">Aciklama</label><input class="form-control" name="description" /></div>
          <div class="col-12 d-flex justify-content-end"><button class="btn btn-primary" type="submit"><i class="ti ti-device-floppy me-1"></i>Grup Bilgilerini Kaydet</button></div>
        </form>
        <hr class="my-4" />
        <form id="group-assign-form" class="row g-3">
          <div class="col-12">
            <div class="transfer">
              <div><label class="form-label">Atanmamis Ajanlar</label><select id="available-agent-uuids" class="form-select" multiple></select></div>
              <div class="transfer-actions">
                <button class="btn btn-outline-secondary btn-sm" type="button" id="move-right-all" title="Tumunu Ekle"><i class="ti ti-chevrons-right"></i></button>
                <button class="btn btn-outline-secondary btn-sm" type="button" id="move-right" title="Secileni Ekle"><i class="ti ti-chevron-right"></i></button>
                <button class="btn btn-outline-secondary btn-sm" type="button" id="move-left" title="Secileni Cikar"><i class="ti ti-chevron-left"></i></button>
                <button class="btn btn-outline-secondary btn-sm" type="button" id="move-left-all" title="Tumunu Cikar"><i class="ti ti-chevrons-left"></i></button>
              </div>
              <div><label class="form-label">Gruptaki Ajanlar</label><select id="assigned-agent-uuids" class="form-select" multiple></select></div>
            </div>
          </div>
          <div class="col-12 text-secondary" id="assign-summary"></div>
          <div class="col-12 d-flex justify-content-end"><button class="btn btn-primary" type="submit"><i class="ti ti-device-floppy me-1"></i>Ajan Atamalarini Kaydet</button></div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  AppCenterApi.protectPage();
  const groupId = Number("{{ group_id }}");
  let groupItem = null;
  let agents = [];

  function clearFormErrors(formEl) { formEl.querySelectorAll('.field-error').forEach((el) => el.remove()); }
  function setFormError(formEl, fieldName, message) {
    const input = formEl.querySelector(`[name="${fieldName}"]`);
    if (!input || !message) return;
    const next = input.nextElementSibling;
    if (next && next.classList && next.classList.contains('field-error')) { next.textContent = message; return; }
    const err = document.createElement('div'); err.className = 'field-error'; err.textContent = message; input.insertAdjacentElement('afterend', err);
  }
  function parseApiErrorToFields(message) {
    const m = (message || '').toString().toLowerCase();
    if (m.includes('group name is required')) return { name: 'Grup adi zorunludur' };
    if (m.includes('group name already exists')) return { name: 'Bu grup adi zaten kullaniliyor' };
    if (m.includes('system group cannot be modified')) return { name: 'Sistem grubu duzenlenemez' };
    return null;
  }

  function toOption(agent) { const o = document.createElement('option'); o.value = agent.uuid; o.textContent = `${agent.hostname || agent.uuid} (${agent.uuid})`; return o; }
  function selectValues(selectEl) { return Array.from(selectEl.options || []).map((o) => o.value); }
  function moveSelected(fromEl, toEl) { Array.from(fromEl.selectedOptions || []).forEach((opt) => { toEl.appendChild(opt); opt.selected = false; }); }
  function moveAll(fromEl, toEl) { Array.from(fromEl.options || []).forEach((opt) => { toEl.appendChild(opt); opt.selected = false; }); }

  function renderAgentLists() {
    const availableEl = document.getElementById('available-agent-uuids');
    const assignedEl = document.getElementById('assigned-agent-uuids');
    const inGroup = agents.filter((a) => Array.isArray(a.group_ids) ? a.group_ids.includes(groupId) : Number(a.group_id || 0) === groupId);
    const outGroup = agents.filter((a) => Array.isArray(a.group_ids) ? !a.group_ids.includes(groupId) : Number(a.group_id || 0) !== groupId);
    availableEl.innerHTML = ''; assignedEl.innerHTML = '';
    outGroup.forEach((a) => availableEl.appendChild(toOption(a)));
    inGroup.forEach((a) => assignedEl.appendChild(toOption(a)));
    document.getElementById('assign-summary').textContent = `Mevcut atama: ${inGroup.length} ajan | Atanmamis: ${outGroup.length}`;
  }

  async function loadData() {
    const [groupData, agentData] = await Promise.all([AppCenterApi.req(`/groups/${groupId}`), AppCenterApi.req('/agents')]);
    groupItem = groupData; agents = agentData.items || [];
    const form = document.getElementById('group-meta-form');
    form.name.value = groupData.name || ''; form.description.value = groupData.description || '';
    renderAgentLists();
  }

  document.getElementById('group-meta-form').addEventListener('submit', async (e) => {
    e.preventDefault(); clearFormErrors(e.target); if (!groupItem) return;
    const form = new FormData(e.target); const name = (form.get('name') || '').toString().trim();
    if (!name) { setFormError(e.target, 'name', 'Grup adi zorunludur'); AppCenterApi.toast('Formda eksik veya hatali alanlar var'); return; }
    try {
      await AppCenterApi.req(`/groups/${groupId}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, description: (form.get('description') || '').toString() || null }),
      });
      AppCenterApi.toast('Grup bilgileri guncellendi'); await loadData();
    } catch (err) {
      const mapped = parseApiErrorToFields(err.message);
      if (mapped) Object.entries(mapped).forEach(([k, v]) => setFormError(e.target, k, v));
      AppCenterApi.toast(err.message);
    }
  });

  document.getElementById('move-right').addEventListener('click', () => moveSelected(document.getElementById('available-agent-uuids'), document.getElementById('assigned-agent-uuids')));
  document.getElementById('move-left').addEventListener('click', () => moveSelected(document.getElementById('assigned-agent-uuids'), document.getElementById('available-agent-uuids')));
  document.getElementById('move-right-all').addEventListener('click', () => moveAll(document.getElementById('available-agent-uuids'), document.getElementById('assigned-agent-uuids')));
  document.getElementById('move-left-all').addEventListener('click', () => moveAll(document.getElementById('assigned-agent-uuids'), document.getElementById('available-agent-uuids')));

  document.getElementById('group-assign-form').addEventListener('submit', async (e) => {
    e.preventDefault(); const uuids = selectValues(document.getElementById('assigned-agent-uuids'));
    try {
      await AppCenterApi.req(`/groups/${groupId}/agents`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ agent_uuids: uuids }) });
      AppCenterApi.toast('Ajan atamalari guncellendi'); await loadData();
    } catch (err) { AppCenterApi.toast(err.message); }
  });

  loadData().catch((err) => AppCenterApi.toast(err.message));
</script>
{% endblock %}
