{% extends 'base.html' %}
{% block title %}Audit Log{% endblock %}
{% block content %}
<div class="card" data-required-roles="admin">
  <div class="row spread wrap">
    <h3 style="margin: 0;">Audit Log</h3>
    <button class="btn secondary" id="audit-refresh-btn" type="button">Yenile</button>
  </div>
  <div class="row wrap" style="margin: 10px 0;">
    <input id="audit-user" placeholder="Kullanici ara" style="max-width:220px;" />
    <input id="audit-action" placeholder="Action ara" style="max-width:220px;" />
    <input id="audit-resource" placeholder="Resource ara" style="max-width:220px;" />
    <label for="audit-created-from" class="muted">Baslangic</label>
    <input id="audit-created-from" type="date" style="max-width:170px;" />
    <label for="audit-created-to" class="muted">Bitis</label>
    <input id="audit-created-to" type="date" style="max-width:170px;" />
    <button class="btn secondary" id="audit-filter-btn" type="button">Filtrele</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Tarih</th><th>Kullanici</th><th>Action</th><th>Resource</th><th>Resource ID</th><th>Detay</th>
        </tr>
      </thead>
      <tbody id="audit-rows"></tbody>
    </table>
  </div>
  <div class="row spread wrap" style="margin-top:10px;">
    <div class="muted" id="audit-page-info">-</div>
    <div class="row">
      <button id="audit-prev" class="btn secondary" type="button">Onceki</button>
      <button id="audit-next" class="btn secondary" type="button">Sonraki</button>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  AppCenterApi.protectPage();

  const LIMIT = 50;
  let currentOffset = 0;
  let currentTotal = 0;

  function esc(s) {
    return (s || '')
      .toString()
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function queryString() {
    const params = new URLSearchParams();
    params.set('limit', String(LIMIT));
    params.set('offset', String(currentOffset));
    const username = (document.getElementById('audit-user').value || '').trim();
    const action = (document.getElementById('audit-action').value || '').trim();
    const resource = (document.getElementById('audit-resource').value || '').trim();
    const createdFrom = (document.getElementById('audit-created-from').value || '').trim();
    const createdTo = (document.getElementById('audit-created-to').value || '').trim();
    if (username) params.set('username', username);
    if (action) params.set('action', action);
    if (resource) params.set('resource_type', resource);
    if (createdFrom) params.set('created_from', createdFrom);
    if (createdTo) params.set('created_to', createdTo);
    return params.toString();
  }

  function detailsHtml(detailsJson, rowId) {
    let parsed = null;
    let pretty = '';
    try {
      parsed = JSON.parse(detailsJson || '{}');
      pretty = JSON.stringify(parsed, null, 2);
    } catch (_) {
      parsed = null;
    }
    const shortText = parsed
      ? JSON.stringify(parsed).slice(0, 120)
      : (detailsJson || '{}').toString().slice(0, 120);
    const btnLabel = 'Detay';
    return `
      <button class="btn secondary" type="button" data-audit-toggle="${rowId}">${btnLabel}</button>
      <div id="audit-detail-${rowId}" class="hidden" style="margin-top:6px;">
        <pre style="max-width:420px; max-height:160px; overflow:auto; margin:0; white-space:pre-wrap;">${esc(pretty || detailsJson || '{}')}</pre>
      </div>
      <div class="muted" style="margin-top:4px;">${esc(shortText)}${(shortText.length >= 120 ? '...' : '')}</div>
    `;
  }

  async function loadAudit() {
    try {
      const data = await AppCenterApi.req(`/audit/logs?${queryString()}`);
      const rows = document.getElementById('audit-rows');
      rows.innerHTML = '';
      const items = data.items || [];
      currentTotal = Number(data.total || 0);
      if (!items.length) {
        rows.innerHTML = '<tr><td colspan="6" class="muted">Kayit yok</td></tr>';
      } else {
        items.forEach((item) => {
          const tr = document.createElement('tr');
          const rowId = `${item.id}`;
          tr.innerHTML = `
            <td>${esc(AppCenterApi.formatDate(item.created_at))}</td>
            <td>${esc(item.username || '-')}</td>
            <td>${esc(item.action || '-')}</td>
            <td>${esc(item.resource_type || '-')}</td>
            <td>${esc(item.resource_id || '-')}</td>
            <td>${detailsHtml(item.details_json || '{}', rowId)}</td>
          `;
          rows.appendChild(tr);
        });
        rows.querySelectorAll('[data-audit-toggle]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const rowId = btn.getAttribute('data-audit-toggle') || '';
            const detail = document.getElementById(`audit-detail-${rowId}`);
            if (!detail) return;
            detail.classList.toggle('hidden');
          });
        });
      }
      const from = currentTotal ? currentOffset + 1 : 0;
      const to = Math.min(currentOffset + LIMIT, currentTotal);
      document.getElementById('audit-page-info').textContent = `${from}-${to} / ${currentTotal}`;
      document.getElementById('audit-prev').disabled = currentOffset <= 0;
      document.getElementById('audit-next').disabled = (currentOffset + LIMIT) >= currentTotal;
    } catch (err) {
      AppCenterApi.toast(err.message);
    }
  }

  function resetAndLoad() {
    currentOffset = 0;
    loadAudit();
  }

  document.getElementById('audit-filter-btn').addEventListener('click', resetAndLoad);
  document.getElementById('audit-refresh-btn').addEventListener('click', loadAudit);
  document.getElementById('audit-prev').addEventListener('click', () => {
    currentOffset = Math.max(0, currentOffset - LIMIT);
    loadAudit();
  });
  document.getElementById('audit-next').addEventListener('click', () => {
    currentOffset += LIMIT;
    loadAudit();
  });
  ['audit-user', 'audit-action', 'audit-resource', 'audit-created-from', 'audit-created-to'].forEach((id) => {
    document.getElementById(id).addEventListener('keydown', (evt) => {
      if (evt.key !== 'Enter') return;
      evt.preventDefault();
      resetAndLoad();
    });
  });
  ['audit-created-from', 'audit-created-to'].forEach((id) => {
    document.getElementById(id).addEventListener('change', resetAndLoad);
  });

  loadAudit();
</script>
{% endblock %}
