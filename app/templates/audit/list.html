{% extends 'base.html' %}
{% block title %}Audit Log{% endblock %}
{% block page_title %}Audit Log{% endblock %}
{% block page_actions %}
<div class="btn-list" data-required-permissions="audit.view">
  <button class="btn btn-outline-primary btn-sm" id="audit-refresh-btn" type="button">
    <i class="ti ti-refresh me-1"></i>Yenile
  </button>
</div>
{% endblock %}
{% block content %}
<style>
  .audit-toolbar .input-icon-addon .icon {
    width: 18px;
    height: 18px;
  }
  .audit-detail-pre {
    max-width: 460px;
    max-height: 180px;
    overflow: auto;
    margin: 0;
    white-space: pre-wrap;
  }
</style>

<div class="card" data-required-permissions="audit.view">
  <div class="card-header">
    <div class="row g-2 w-100 audit-toolbar">
      <div class="col-12 col-md-3">
        <div class="input-icon">
          <span class="input-icon-addon"><i class="ti ti-user icon"></i></span>
          <input id="audit-user" class="form-control" placeholder="Kullanici ara" />
        </div>
      </div>
      <div class="col-12 col-md-3">
        <div class="input-icon">
          <span class="input-icon-addon"><i class="ti ti-bolt icon"></i></span>
          <input id="audit-action" class="form-control" placeholder="Action ara" />
        </div>
      </div>
      <div class="col-12 col-md-3">
        <div class="input-icon">
          <span class="input-icon-addon"><i class="ti ti-database icon"></i></span>
          <input id="audit-resource" class="form-control" placeholder="Resource ara" />
        </div>
      </div>
      <div class="col-6 col-md-1">
        <input id="audit-created-from" class="form-control" type="date" title="Baslangic" />
      </div>
      <div class="col-6 col-md-1">
        <input id="audit-created-to" class="form-control" type="date" title="Bitis" />
      </div>
      <div class="col-12 col-md-1 d-grid">
        <button class="btn btn-outline-primary" id="audit-filter-btn" type="button"><i class="ti ti-filter me-1"></i>Filtrele</button>
      </div>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table card-table table-vcenter">
      <thead>
        <tr>
          <th>Tarih</th>
          <th>Kullanici</th>
          <th>Action</th>
          <th>Resource</th>
          <th>Resource ID</th>
          <th><i class="ti ti-eye me-1"></i>Detay</th>
        </tr>
      </thead>
      <tbody id="audit-rows">
        <tr><td colspan="6" class="text-secondary">Yukleniyor...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="card-footer d-flex align-items-center justify-content-between">
    <div class="text-secondary" id="audit-page-info">-</div>
    <div class="btn-list">
      <button id="audit-prev" class="btn btn-outline-secondary btn-sm" type="button"><i class="ti ti-chevron-left me-1"></i>Onceki</button>
      <button id="audit-next" class="btn btn-outline-secondary btn-sm" type="button"><i class="ti ti-chevron-right me-1"></i>Sonraki</button>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  AppCenterApi.protectPage();

  const LIMIT = 50;
  let currentOffset = 0;
  let currentTotal = 0;

  function esc(s) {
    return (s || '')
      .toString()
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function queryString() {
    const params = new URLSearchParams();
    params.set('limit', String(LIMIT));
    params.set('offset', String(currentOffset));
    const username = (document.getElementById('audit-user').value || '').trim();
    const action = (document.getElementById('audit-action').value || '').trim();
    const resource = (document.getElementById('audit-resource').value || '').trim();
    const createdFrom = (document.getElementById('audit-created-from').value || '').trim();
    const createdTo = (document.getElementById('audit-created-to').value || '').trim();
    if (username) params.set('username', username);
    if (action) params.set('action', action);
    if (resource) params.set('resource_type', resource);
    if (createdFrom) params.set('created_from', createdFrom);
    if (createdTo) params.set('created_to', createdTo);
    return params.toString();
  }

  function detailsHtml(detailsJson, rowId) {
    let parsed = null;
    let pretty = '';
    try {
      parsed = JSON.parse(detailsJson || '{}');
      pretty = JSON.stringify(parsed, null, 2);
    } catch (_) {
      parsed = null;
    }

    const shortText = parsed
      ? JSON.stringify(parsed).slice(0, 120)
      : (detailsJson || '{}').toString().slice(0, 120);

    return `
      <button class="btn btn-outline-secondary btn-sm" type="button" data-audit-toggle="${rowId}"><i class="ti ti-eye me-1"></i>Detay</button>
      <div id="audit-detail-${rowId}" class="d-none mt-2">
        <pre class="audit-detail-pre">${esc(pretty || detailsJson || '{}')}</pre>
      </div>
      <div class="text-secondary mt-1">${esc(shortText)}${(shortText.length >= 120 ? '...' : '')}</div>
    `;
  }

  async function loadAudit() {
    try {
      const data = await AppCenterApi.req(`/audit/logs?${queryString()}`);
      const rows = document.getElementById('audit-rows');
      rows.innerHTML = '';
      const items = data.items || [];
      currentTotal = Number(data.total || 0);

      if (!items.length) {
        rows.innerHTML = '<tr><td colspan="6" class="text-secondary">Kayit yok</td></tr>';
      } else {
        items.forEach((item) => {
          const tr = document.createElement('tr');
          const rowId = `${item.id}`;
          tr.innerHTML = `
            <td>${esc(AppCenterApi.formatDate(item.created_at))}</td>
            <td>${esc(item.username || '-')}</td>
            <td>${esc(item.action || '-')}</td>
            <td>${esc(item.resource_type || '-')}</td>
            <td>${esc(item.resource_id || '-')}</td>
            <td>${detailsHtml(item.details_json || '{}', rowId)}</td>
          `;
          rows.appendChild(tr);
        });

        rows.querySelectorAll('[data-audit-toggle]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const rowId = btn.getAttribute('data-audit-toggle') || '';
            const detail = document.getElementById(`audit-detail-${rowId}`);
            if (!detail) return;
            detail.classList.toggle('d-none');
          });
        });
      }

      const from = currentTotal ? currentOffset + 1 : 0;
      const to = Math.min(currentOffset + LIMIT, currentTotal);
      document.getElementById('audit-page-info').textContent = `${from}-${to} / ${currentTotal}`;
      document.getElementById('audit-prev').disabled = currentOffset <= 0;
      document.getElementById('audit-next').disabled = (currentOffset + LIMIT) >= currentTotal;
    } catch (err) {
      AppCenterApi.toast(err.message);
    }
  }

  function resetAndLoad() {
    currentOffset = 0;
    loadAudit();
  }

  document.getElementById('audit-filter-btn').addEventListener('click', resetAndLoad);
  document.getElementById('audit-refresh-btn').addEventListener('click', loadAudit);
  document.getElementById('audit-prev').addEventListener('click', () => {
    currentOffset = Math.max(0, currentOffset - LIMIT);
    loadAudit();
  });
  document.getElementById('audit-next').addEventListener('click', () => {
    currentOffset += LIMIT;
    loadAudit();
  });

  ['audit-user', 'audit-action', 'audit-resource', 'audit-created-from', 'audit-created-to'].forEach((id) => {
    document.getElementById(id).addEventListener('keydown', (evt) => {
      if (evt.key !== 'Enter') return;
      evt.preventDefault();
      resetAndLoad();
    });
  });
  ['audit-created-from', 'audit-created-to'].forEach((id) => {
    document.getElementById(id).addEventListener('change', resetAndLoad);
  });

  loadAudit();
</script>
{% endblock %}
